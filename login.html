<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Extreme Verify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #000000;
            --card-bg: rgba(22, 22, 23, 0.8);
            --blue-gradient: linear-gradient(135deg, #00C6FF 0%, #0071E3 100%);
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255, 255, 255, 0.04);
            --error: #ff453a;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% -10%, rgba(0, 113, 227, 0.15), transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(191, 90, 242, 0.05), transparent 30%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 48px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: appleReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes appleReveal {
            from {
                opacity: 0;
                transform: scale(0.97) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .brand-header {
            margin-bottom: 32px;
        }

        .logo-container {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            filter: drop-shadow(0 4px 10px rgba(0, 113, 227, 0.3));
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .extreme-logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            background: var(--blue-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .caption {
            color: var(--text-dim);
            font-size: 15px;
            margin-top: 6px;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #6e6e73;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .btn-glow {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-glow:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 113, 227, 0.3);
        }

        .btn-glow:active {
            transform: scale(0.98);
        }

        .link {
            margin-top: 28px;
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }

        #errorBox {
            color: var(--error);
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.2);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="brand-header">
            <div class="logo-container">
                <img src="https://extremeweb.in/images/extreme.png" alt="Extreme Verify Logo" class="logo-img">
            </div>
            <h2 class="extreme-logo">Extreme Verify</h2>
            <div class="caption">Sign in to your control center</div>
        </div>

        <form action="/login" method="POST">
            <div id="errorBox" style="display:none;">Invalid email or password. Please try again.</div>

            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required minlength="3">

            <button type="submit" class="btn-glow">Sign In</button>
        </form>

        <a href="/register.html" class="link">Create new account &rarr;</a>
    </div>

    <script>
        // Logic remains untouched
        const urlParams = new URLSearchParams(window.location.search);
        const errorBox = document.getElementById('errorBox');
        if (urlParams.has('error')) {
            const err = urlParams.get('error');
            if (err === 'wrong_pass') {
                errorBox.innerText = 'Wrong password.';
            } else if (err === 'no_user') {
                errorBox.innerText = 'User not found or invalid email.';
            } else {
                errorBox.innerText = 'Invalid email or password. Please try again.';
            }
            errorBox.style.display = 'block';
        }
    </script>
</body>

</html>
