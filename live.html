<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Verify - Live Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #000000;
            --surface-1: #0a0a0a;
            --surface-2: #141414;
            --surface-3: #1c1c1e;
            --border: rgba(255, 255, 255, 0.08);
            --blue: #0a84ff;
            --blue-dim: rgba(10, 132, 255, 0.1);
            --green: #30d158;
            --green-dim: rgba(48, 209, 88, 0.1);
            --orange: #ff9f0a;
            --orange-dim: rgba(255, 159, 10, 0.1);
            --red: #ff453a;
            --text-1: #ffffff;
            --text-2: rgba(235, 235, 245, 0.8);
            --text-3: rgba(235, 235, 245, 0.38);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
            --radius: 10px;
            --radius-lg: 14px;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: #000;
            color: var(--text-1);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--surface-1);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 4px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px 28px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-1);
        }

        .sidebar-section {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-3);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 16px 10px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--text-2);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .nav-item svg {
            opacity: 0.6;
            flex-shrink: 0;
        }

        .nav-item:hover {
            background: var(--surface-2);
            color: var(--text-1);
        }

        .nav-item:hover svg {
            opacity: 1;
        }

        .nav-item.active {
            background: var(--blue);
            color: #ffffff;
            font-weight: 500;
        }

        .nav-item.active svg {
            opacity: 1;
        }

        .nav-item.danger {
            color: #ef4444;
        }

        .nav-item.danger svg {
            opacity: 0.8;
        }

        .nav-item.danger:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        .sidebar-spacer {
            flex: 1;
        }

        .sidebar-user {
            padding: 14px;
            border-radius: var(--radius);
            background: var(--surface-2);
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-email {
            font-size: 11px;
            color: var(--text-3);
            font-family: var(--mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 7px;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 500;
            color: var(--blue);
            background: rgba(10, 132, 255, 0.12);
            padding: 2px 8px;
            border-radius: 100px;
            letter-spacing: 0.04em;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 28px 36px;
            background: #000;
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .topbar-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .topbar-sub {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--text-3);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }

        .card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
        }

        .card-sub {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .btn-copy {
            padding: 6px 13px;
            border-radius: 7px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-family: var(--mono);
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }

        .btn-copy:hover {
            background: #2a2a2a;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 12px;
            text-align: left;
        }

        th,
        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-3);
            font-weight: 500;
            letter-spacing: 0.05em;
            font-size: 10px;
            text-transform: uppercase;
        }

        td {
            color: var(--text-2);
        }

        tbody tr:hover {
            background: var(--surface-2);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .badge-sandbox {
            background: var(--orange-dim);
            color: var(--orange);
            border: 1px solid rgba(249, 115, 22, 0.2);
        }

        .badge-prod {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(48, 209, 88, 0.2);
        }

        .main::-webkit-scrollbar {
            width: 5px;
        }

        .main::-webkit-scrollbar-track {
            background: transparent;
        }

        .main::-webkit-scrollbar-thumb {
            background: var(--surface-3);
            border-radius: 3px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-field {
            flex: 1;
            padding: 10px 14px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.12s;
            -webkit-font-smoothing: antialiased;
        }

        .input-field::placeholder {
            color: var(--text-3);
        }

        .input-field:focus {
            border-color: rgba(10, 132, 255, 0.5);
        }

        .btn-primary {
            padding: 11px 22px;
            border-radius: var(--radius);
            background: var(--blue);
            border: none;
            color: #fff;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Usage Bar ── */
        .usage-container {
            margin-top: 10px;
        }

        .usage-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .usage-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
        }

        .usage-tier {
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 700;
            color: var(--blue);
            background: var(--blue-dim);
            padding: 3px 10px;
            border-radius: 100px;
            letter-spacing: 0.05em;
        }

        .usage-bar-bg {
            height: 8px;
            background: var(--surface-3);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .usage-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #60a5fa);
            border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .usage-stats {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text-3);
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
    <script>
        function copyKey() {
            navigator.clipboard.writeText("{{API_KEY}}");
            const btn = document.getElementById("copyBtn");
            const orig = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.color = "var(--green)";
            btn.style.borderColor = "rgba(0,255,136,0.3)";
            setTimeout(() => { btn.innerText = orig; btn.style.color = ""; btn.style.borderColor = ""; }, 2000);
        }
        function toggleKey(btn) {
            const el = document.getElementById("apiKeyDisplay");
            const visible = btn.dataset.visible === "true";
            if (visible) {
                el.innerText = "••••••••••••••••••••••••••••••••••••";
                btn.innerText = "SHOW";
                btn.dataset.visible = "false";
            } else {
                el.innerText = "{{API_KEY}}";
                btn.innerText = "HIDE";
                btn.dataset.visible = "true";
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('testOtpForm');
            if (!form) return;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const num = document.getElementById('testNumber').value;
                const statusEl = document.getElementById('testOtpStatus');
                const btn = form.querySelector('button[type="submit"]');
                btn.disabled = true;
                statusEl.style.color = 'var(--text-2)';
                statusEl.innerText = 'Sending…';
                try {
                    const r = await fetch('/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: '{{USER_ID}}', number: num })
                    });
                    const d = await r.json();
                    if (d.alert) alert(d.alert);
                    statusEl.innerText = d.message || 'Done';
                    statusEl.style.color = (d.message && (d.message.includes('OTP Sent') || d.message.includes('Please wait'))) ? 'var(--orange)' : 'var(--red)';
                    if (d.message && d.message.includes('OTP Sent')) statusEl.style.color = 'var(--green)';
                    if (r.ok || (d.message && d.message.includes('Please wait'))) {
                        let remaining = 45;
                        if (d.message && d.message.includes('Please wait')) {
                            const match = d.message.match(/(\d+) seconds/);
                            if (match) remaining = parseInt(match[1], 10);
                        }
                        btn.innerText = `Wait ${remaining}s`;
                        const interval = setInterval(() => {
                            remaining--;
                            if (remaining > 0) { btn.innerText = `Wait ${remaining}s`; }
                            else { clearInterval(interval); btn.innerText = 'Send OTP'; btn.disabled = false; }
                        }, 1000);
                    } else { btn.disabled = false; }
                } catch (err) { statusEl.innerText = 'Request failed'; statusEl.style.color = 'var(--red)'; btn.disabled = false; }
            });

            // Usage Bar Fix
            const bar = document.getElementById('usageBarFill');
            if (bar) bar.style.width = bar.dataset.percentage + '%';
        });
    </script>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="https://extremeweb.in/images/extreme.png" alt="Extreme Logo" class="logo-icon">
            <span class="logo-text">Extreme Verify</span>
        </div>
        <span class="sidebar-section">Navigation</span>
        <a class="nav-item" href="/dashboard/{{USER_ID}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            Overview
        </a>
        <a class="nav-item" href="/api-key/{{USER_ID}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
            </svg>
            API Key
        </a>
        <a class="nav-item active" href="/live/{{USER_ID}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            Live Graph
        </a>
        <a class="nav-item" href="/docs/{{USER_ID}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
            </svg>
            Docs
        </a>
        <a class="nav-item" href="/settings/{{USER_ID}}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            Settings
        </a>
        <div class="sidebar-spacer"></div>
        <div class="sidebar-user">
            <div class="sidebar-user-name">{{FULL_NAME}}</div>
            <div class="sidebar-user-email">{{EMAIL}}</div>
            <div class="sidebar-user-badge"><svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor">
                    <circle cx="4" cy="4" r="4" />
                </svg> {{DEV_CATEGORY}}</div>
        </div>
        <a href="/login.html" class="nav-item danger"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg> Logout</a>
    </aside>
    <main class="main">
        <div class="topbar">
            <div>
                <div class="topbar-title">Live API Metrics</div>
                <div class="topbar-sub">Realtime visualization of system traffic</div>
            </div>
        </div>

        <!-- KPI CARDS -->
        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
            <div class="card"
                style="margin-bottom: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center;">
                <div style="font-size: 11px; font-family: var(--mono); color: var(--text-3); margin-bottom: 8px;">TOTAL
                    7-DAY VOLUME</div>
                <div style="font-size: 32px; font-weight: 700; color: #fff; line-height: 1;" id="kpiTotal">0</div>
            </div>
            <div class="card"
                style="margin-bottom: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center;">
                <div
                    style="font-size: 11px; font-family: var(--mono); color: rgba(10,132,255,0.8); margin-bottom: 8px; display:flex; align-items:center; gap:6px;">
                    <span
                        style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow: 0 0 8px var(--blue);"></span>
                    MESSAGE ALERTS
                </div>
                <div style="font-size: 32px; font-weight: 700; color: #fff; line-height: 1;" id="kpiCustom">0</div>
            </div>
            <div class="card"
                style="margin-bottom: 0; padding: 20px; display: flex; flex-direction: column; justify-content: center;">
                <div
                    style="font-size: 11px; font-family: var(--mono); color: rgba(48,209,88,0.8); margin-bottom: 8px; display:flex; align-items:center; gap:6px;">
                    <span
                        style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow: 0 0 8px var(--green);"></span>
                    VERIFICATION OTPS
                </div>
                <div style="font-size: 32px; font-weight: 700; color: #fff; line-height: 1;" id="kpiOtp">0</div>
            </div>
        </div>

        <!-- MAIN CHART -->
        <div class="card" style="padding: 24px;">
            <div class="card-header" style="margin-bottom: 24px;">
                <div>
                    <div class="card-title">Delivery Timeline</div>
                    <div class="card-sub">Daily breakdown of dispatched messages</div>
                </div>
            </div>

            <div
                style="background:var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; height: 380px; width: 100%;">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const res = await fetch('/api/live-data/{{USER_ID}}');
                const data = await res.json();

                // Populate KPIs
                const totalCustom = data.customCounts.reduce((a, b) => a + b, 0);
                const totalOtp = data.otpCounts.reduce((a, b) => a + b, 0);

                document.getElementById('kpiCustom').innerText = totalCustom.toLocaleString();
                document.getElementById('kpiOtp').innerText = totalOtp.toLocaleString();
                document.getElementById('kpiTotal').innerText = (totalCustom + totalOtp).toLocaleString();

                const ctx = document.getElementById('trafficChart').getContext('2d');

                // Gradients for sleek area charts
                const gradientBlue = ctx.createLinearGradient(0, 0, 0, 380);
                gradientBlue.addColorStop(0, 'rgba(10, 132, 255, 0.5)');
                gradientBlue.addColorStop(1, 'rgba(10, 132, 255, 0.0)');

                const gradientGreen = ctx.createLinearGradient(0, 0, 0, 380);
                gradientGreen.addColorStop(0, 'rgba(48, 209, 88, 0.5)');
                gradientGreen.addColorStop(1, 'rgba(48, 209, 88, 0.0)');

                Chart.defaults.color = 'rgba(235, 235, 245, 0.5)';
                Chart.defaults.font.family = "'Inter', sans-serif";

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels.map(dateStr => {
                            const d = new Date(dateStr);
                            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        }),
                        datasets: [
                            {
                                label: 'Custom Alerts',
                                data: data.customCounts,
                                borderColor: '#0a84ff',
                                backgroundColor: gradientBlue,
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true,
                                pointBackgroundColor: '#000',
                                pointBorderColor: '#0a84ff',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            },
                            {
                                label: 'Verification OTPs',
                                data: data.otpCounts,
                                borderColor: '#30d158',
                                backgroundColor: gradientGreen,
                                borderWidth: 2,
                                tension: 0.4,
                                fill: true,
                                pointBackgroundColor: '#000',
                                pointBorderColor: '#30d158',
                                pointBorderWidth: 2,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: {
                                grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                                ticks: { padding: 10 }
                            },
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                                ticks: { stepSize: 1, padding: 10 }
                            }
                        },
                        plugins: {
                            legend: {
                                position: 'top',
                                align: 'end',
                                labels: { usePointStyle: true, boxWidth: 8, padding: 20, font: { size: 12, weight: 500 } }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(10,10,10,0.9)',
                                titleColor: '#fff',
                                bodyColor: '#ccc',
                                borderColor: 'rgba(255,255,255,0.1)',
                                borderWidth: 1,
                                padding: 14,
                                cornerRadius: 8,
                                titleFont: { size: 13, weight: 600 },
                                bodyFont: { size: 12 },
                                usePointStyle: true
                            }
                        }
                    }
                });
            } catch (err) {
                console.error('Failed to load chart data', err);
            }
        });
    </script>
</body>

</html>
